# Alert rule thresholds.
# Rules compare current snapshot against a historical snapshot N seconds ago.

tvl_drop:
  # 在 time_window_sec 窗口内,TVL 跌幅超过 threshold_pct 触发
  - name: "tvl_drop_5m_5pct"
    level: "warning"
    time_window_sec: 300
    threshold_pct: 5.0
  - name: "tvl_drop_5m_15pct"
    level: "alert"
    time_window_sec: 300
    threshold_pct: 15.0
  - name: "tvl_drop_1m_10pct"
    level: "critical"
    time_window_sec: 60
    threshold_pct: 10.0

utilization:
  # 借用率超过阈值
  - name: "utilization_95pct"
    level: "alert"
    threshold_pct: 95.0
  - name: "utilization_99pct"
    level: "critical"
    threshold_pct: 99.0

borrow_surge:
  # 在 time_window_sec 内借款激增
  - name: "borrow_surge_5m_20pct"
    level: "warning"
    time_window_sec: 300
    threshold_pct: 20.0
  - name: "borrow_surge_1m_10pct"
    level: "alert"
    time_window_sec: 60
    threshold_pct: 10.0

liquidity_drain:
  # available liquidity (supply - borrow) 骤降
  - name: "liquidity_drain_5m_30pct"
    level: "alert"
    time_window_sec: 300
    threshold_pct: 30.0
  - name: "liquidity_drain_1m_20pct"
    level: "critical"
    time_window_sec: 60
    threshold_pct: 20.0

# ---------- Track C:大额单笔转账告警 ----------
# 每 tick 扫 Pool 合约的 Supply/Withdraw/Borrow/Repay 事件,过滤大额触发告警。
# 默认只对"流出"(Withdraw/Borrow)告警 — 资金流出池子才是风险;流入(Supply/
# Repay)偏正向,按需在 event_types 里加。
#
# 两套阈值并行:
# 1) usd_thresholds:固定美元金额,适合大池子(ETH 上 TVL>1B 的主流稳定币)
# 2) pct_thresholds:按占池 supply 百分比,对小池子(如 avaxc 的 USDt $32M)
#    更敏感 — 固定 $1M 在大池里微不足道,但对小池是 3% 深度冲击
#
# 同一笔 tx 只告警一次(按 tx_hash+log_index 去重),内存滚动 24h。
large_transfer:
  event_types: ["Withdraw", "Borrow"]
  usd_thresholds:
    - {name: "large_withdraw_1m",  level: "warning",  usd: 1000000}
    - {name: "large_withdraw_5m",  level: "alert",    usd: 5000000}
    - {name: "large_withdraw_10m", level: "critical", usd: 10000000}
  pct_thresholds:
    # 仅在池子 supply_usd 低于此值时启用百分比规则(大池子已有固定金额覆盖)
    enable_if_supply_below_usd: 100000000
    rules:
      - {name: "large_withdraw_1pct", level: "warning",  pct: 1.0}
      - {name: "large_withdraw_3pct", level: "alert",    pct: 3.0}
      - {name: "large_withdraw_5pct", level: "critical", pct: 5.0}

# 可以通过 env ALERT_MIN_LEVEL 全局过滤
# 默认去重:同一 (pool, rule) 对 5 分钟内不重复告警
# 大额转账另按 (tx_hash, log_index) 去重,同笔只告警一次
dedup:
  window_sec: 300

# ---------- Track B:链上事件告警 ----------
# 每 tick eth_getLogs 监听 PoolAddressesProvider + Pool 代理合约的权限/升级事件
# 默认级别按 PRD FR-06 给定;事件名在 src/events.py 定义。
# 首次启动回看 ~1 小时历史(只入库,不推 Lark,避免重启刷屏)。
events:
  levels:
    # PoolAddressesProvider 级
    OwnershipTransferred:    alert       # R-AUTH-01 所有权转移
    PoolUpdated:             alert       # Pool 实现替换(等同 Upgraded)
    PoolConfiguratorUpdated: alert
    PriceOracleUpdated:      alert       # 预言机替换,潜在操纵入口
    ACLManagerUpdated:       alert
    ACLAdminUpdated:         alert       # R-AUTH-04 admin 角色变更
    PoolDataProviderUpdated: warning     # 只读元数据,优先级较低
    AddressSet:              warning
    AddressSetAsProxy:       alert
    ProxyCreated:            warning
    # Pool 代理(ERC1967 + Pausable)级
    AdminChanged:            alert       # R-AUTH-02 代理管理员变更
    Upgraded:                alert       # R-AUTH-03 实现替换
    BeaconUpgraded:          alert
    Paused:                  warning     # R-AUTH-05 紧急暂停
    Unpaused:                warning
