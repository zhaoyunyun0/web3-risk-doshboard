/* =========================================================
   Tab 5: Permissions
   ========================================================= */
async function renderPermissions(box, pk) {
  const pool = state.pools.find(x => x.pool_key === pk);
  if (!pool) {
    box.innerHTML = `<div class="error">未找到池子信息</div>`;
    return;
  }
  // 默认查时间窗可切换 — 7d 需扫 RPC 日志 ~40k block,耗时 15-40s(首次),
  // 之后吃 permissions_cache。24h 是 24h 需 3k block,约 10-15s
  const hours = state.permHours || 168;
  box.innerHTML = `
    <div class="toolbar" style="align-items:center;flex-wrap:wrap;gap:8px">
      <div style="font-size:12px;color:var(--text-2,#94a3b8)">协议级别权限事件 · ${_protocolZh(pool.protocol)} / ${_chainZh(pool.chain)}</div>
      <div class="range-switcher" id="perm-range" style="margin-left:auto">
        ${[24,72,168].map(h => {
          const lbl = h===168 ? "7d" : h===72 ? "3d" : "24h";
          return `<button data-h="${h}" class="${h===hours?'active':''}">${lbl}</button>`;
        }).join("")}
      </div>
    </div>
    <div id="perm-body"></div>
  `;
  document.querySelectorAll("#perm-range button").forEach(b => {
    b.onclick = () => { state.permHours = parseInt(b.dataset.h); renderPermissions(box, pk); };
  });
  // 进度感强的加载态:skeleton + 计时器 + 提示文案
  const body = document.getElementById("perm-body");
  const startTs = Date.now();
  const expectSec = hours >= 168 ? "15–40 秒" : hours >= 72 ? "10–25 秒" : "5–15 秒";
  body.innerHTML = `
    <div style="padding:16px;background:var(--bg-1,#0f172a);border:1px solid var(--bg-2,#1e293b);border-radius:6px;margin-bottom:12px">
      <div style="color:var(--text-0,#e2e8f0);font-size:13px;margin-bottom:4px">🔄 正在扫 RPC 日志获取权限事件…</div>
      <div style="color:var(--text-2,#94a3b8);font-size:12px">预期耗时 ${expectSec}(首次) · 已用 <span id="perm-elapsed">0</span> 秒 · 之后会缓存</div>
    </div>
    <div class="skeleton" style="height:36px;margin-bottom:6px"></div>
    <div class="skeleton" style="height:36px;margin-bottom:6px"></div>
    <div class="skeleton" style="height:36px;margin-bottom:6px"></div>
  `;
  const elapsedTimer = setInterval(() => {
    const el = document.getElementById("perm-elapsed");
    if (!el) { clearInterval(elapsedTimer); return; }
    el.textContent = Math.round((Date.now() - startTs) / 1000);
  }, 500);
  const r = await api(`/api/permissions?protocol=${encodeURIComponent(pool.protocol)}&chain=${encodeURIComponent(pool.chain)}&hours=${hours}`);
  clearInterval(elapsedTimer);
  const body = document.getElementById("perm-body");
  if (!r.ok) {
    body.innerHTML = `<div class="notice-warning">数据不可用: ${r.error}</div>`;
    return;
  }
  const events = r.events || [];
  const hoursLbl = hours >= 168 ? "7 天" : hours >= 72 ? "3 天" : "24 小时";
  if (events.length === 0) {
    body.innerHTML = `<div class="empty" style="color:#4ade80;font-size:14px">✅ 近 ${hoursLbl}无权限变更（正常）</div>`;
    return;
  }
  body.innerHTML = `
    <table class="data-table">
      <thead><tr>
        <th>时间</th><th>合约</th><th>事件</th>
        <th>含义</th><th>旧值 → 新值</th><th>TX</th>
      </tr></thead>
      <tbody>
      ${events.map(e => `
        <tr>
          <td title="${fmtAbsTime(e.ts)}">${fmtRelTime(e.ts)}</td>
          <td>
            <a class="addr" href="${explorerAddrUrl(pool.chain, e.contract)}" target="_blank" title="${e.contract}">${fmtAddr(e.contract)}</a>
            ${e.contract_role ? `<div style="font-size:10px;color:#64748b">${e.contract_role}</div>` : ""}
          </td>
          <td style="color:#fb923c">${e.event}</td>
          <td>${e.description_zh || ""}</td>
          <td class="mono" style="font-size:11px">
            ${e.old_value ? `<span style="color:#64748b">${fmtAddr(e.old_value)}</span> → ` : ""}
            <span style="color:#facc15">${e.new_value ? fmtAddr(e.new_value) : ""}</span>
          </td>
          <td><a class="addr" href="${explorerTxUrl(pool.chain, e.tx_hash)}" target="_blank" title="${e.tx_hash}">${fmtAddr(e.tx_hash)}</a></td>
        </tr>
      `).join("")}
      </tbody>
    </table>
  `;
}

/* =========================================================
   Tab 6: Alerts
   ========================================================= */
async function renderAlerts(box, pk) {
  box.innerHTML = `<div id="alerts-body"><div class="loading">加载中…</div></div>`;
  // 并行拉告警 + 当前激活的屏蔽规则,合并展示
  const [r, mutesResp] = await Promise.all([
    api(`/api/pools/${encodeURIComponent(pk)}/alerts?limit=50`),
    api("/api/mutes"),
  ]);
  const body = document.getElementById("alerts-body");
  if (!r.ok) {
    body.innerHTML = `<div class="notice-warning">数据不可用: ${r.error}</div>`;
    return;
  }
  const alerts = r.alerts || [];
  if (alerts.length === 0) {
    body.innerHTML = `<div class="empty" style="color:#4ade80">✅ 无历史告警</div>`;
    return;
  }
  const activeMutes = (mutesResp && mutesResp.ok && mutesResp.mutes) || [];
  // 命中条件:同 pool 且 (rule 为空[=整池屏蔽] 或 rule 精确匹配)
  const findMute = (rule) => activeMutes.find(m =>
    m.pool_key === pk && (!m.rule || m.rule === rule)
  );

  const nowSec = Date.now() / 1000;

  // --- 聚合:同 rule + 同 level 在 60s 窗内的告警合并为一组 ---
  const AGG_WINDOW_SEC = 60;
  const groups = []; // {head: alert, items: [alert,...]}
  const sortedAlerts = [...alerts].sort((a, b) => b.ts - a.ts);
  for (const a of sortedAlerts) {
    const last = groups[groups.length - 1];
    if (last
        && last.head.rule === a.rule
        && last.head.level === a.level
        && Math.abs(last.head.ts - a.ts) <= AGG_WINDOW_SEC
        && (last.items[last.items.length - 1].ts - a.ts) <= AGG_WINDOW_SEC) {
      last.items.push(a);
      continue;
    }
    groups.push({ head: a, items: [a] });
  }

  const rowsHtml = groups.map((g, i) => {
    const a = g.head;
    const n = g.items.length;
    const mute = a.rule ? findMute(a.rule) : null;
    const aggBadge = n > 1 ? `<span class="agg-count" title="60s 内同规则重复 ${n} 次">×${n}</span>` : "";
    let actionCell = `<button class="expand-btn" data-i="${i}">展开</button>`;
    if (a.rule) {
      if (mute) {
        const isPoolWide = !mute.rule;
        const remain = mute.until ? (mute.until - nowSec) : null;
        const shortUntil = mute.until ? fmtShortDuration(remain) : "永久";
        const tip = (mute.reason || "(无原因)") + " · 到期 " + (mute.human_until || "永久");
        const scope = isPoolWide ? "(整池)" : "";
        actionCell += ` <span class="mute-badge" title="${tip}">✅ 屏蔽中${scope} · ${shortUntil}</span>`;
        actionCell += ` <button class="mute-undo-inline btn-ghost-danger" data-rule="${mute.rule || ""}" data-pk="${pk}">取消</button>`;
      } else {
        actionCell += ` <button class="mute-rule-inline btn-ghost-warn" data-rule="${a.rule}" data-pk="${pk}" title="屏蔽这条规则 7 天">🔕 屏蔽 7d</button>`;
      }
    }
    // 展开区:如果 group 有多条,列出每一条的时间 + metrics;否则展示 head metrics
    const detailBody = n > 1
      ? g.items.map(it => `<div style="margin-bottom:6px"><span style="color:var(--accent)">${fmtAbsTime(it.ts)}</span>  ${JSON.stringify(it.metrics || {})}</div>`).join("")
      : JSON.stringify(a.metrics || {}, null, 2);
    return `
      <tr class="level-row-${a.level}">
        <td title="${fmtAbsTime(a.ts)}">${fmtRelTime(a.ts)}${n > 1 ? `<div style="color:var(--text-3);font-size:10px">首次 ${fmtRelTime(g.items[g.items.length - 1].ts)}</div>` : ""}</td>
        <td><span class="level-tag level-${a.level}">${a.level_zh || a.level}</span></td>
        <td class="mono" style="font-size:11px;color:var(--text-2)">${a.rule || ""}${aggBadge}</td>
        <td>${fmtAlertMessage(a.message)}</td>
        <td>${actionCell}</td>
      </tr>
      <tr class="metrics-row" id="metrics-${i}" style="display:none"><td colspan="5">${detailBody}</td></tr>
    `;
  }).join("");

  body.innerHTML = `
    <table class="data-table alerts-table">
      <thead><tr>
        <th style="width:110px">时间</th>
        <th style="width:70px">级别</th>
        <th style="width:170px">规则</th>
        <th>消息</th>
        <th style="width:210px">操作</th>
      </tr></thead>
      <tbody id="alerts-tbody">${rowsHtml}</tbody>
    </table>
  `;
  document.querySelectorAll(".expand-btn").forEach(b => {
    b.onclick = () => {
      const i = b.dataset.i;
      const row = document.getElementById("metrics-" + i);
      const open = row.style.display !== "none";
      row.style.display = open ? "none" : "table-row";
      b.textContent = open ? "展开" : "收起";
    };
  });
  document.querySelectorAll(".mute-rule-inline").forEach(b => {
    b.onclick = async () => {
      const rule = b.dataset.rule;
      const poolKey = b.dataset.pk;
      const reason = prompt(`屏蔽规则 ${rule} 7 天,原因?`, "UI 触发") || "UI 触发";
      b.disabled = true;
      b.textContent = "处理中…";
      const resp = await apiAddMute(poolKey, rule, "7d", reason);
      if (resp.ok) {
        await renderAlerts(box, pk);  // 重渲染,所有同规则行都会切到"已屏蔽"状态
      } else {
        alert("屏蔽失败: " + (resp.error || resp.detail || "未知错误"));
        b.disabled = false;
        b.textContent = "🔕 屏蔽 7d";
      }
    };
  });
  document.querySelectorAll(".mute-undo-inline").forEach(b => {
    b.onclick = async () => {
      const rule = b.dataset.rule || null;
      const poolKey = b.dataset.pk;
      if (!confirm(rule ? `取消屏蔽规则 ${rule}?` : "取消整个池子的屏蔽?")) return;
      b.disabled = true;
      b.textContent = "处理中…";
      const resp = await apiRemoveMute(poolKey, rule);
      if (resp.ok) {
        await renderAlerts(box, pk);
      } else {
        alert("取消失败: " + (resp.error || resp.detail || "未知错误"));
        b.disabled = false;
        b.textContent = "取消";
      }
    };
  });
}

/* =========================================================
   Bottom alert stream
   ========================================================= */
const ALERT_STREAM_MAX = 10;

function renderAlertStream() {
  const body = document.getElementById("alert-stream-body");
  const alerts = state.alertStream || [];
  if (alerts.length === 0) {
    body.innerHTML = `<div class="empty" style="padding:16px;color:var(--success)">✅ 暂无最近告警</div>`;
    return;
  }
  // 聚合:同 pool_key + rule + level 在 60s 内合并为一条
  const AGG = 60;
  const groups = [];
  for (const a of alerts) {
    const key = `${a.pool_key}|${a.rule}|${a.level}`;
    const last = groups[groups.length - 1];
    if (last && last.key === key && Math.abs(last.head.ts - a.ts) <= AGG) {
      last.count += 1;
      continue;
    }
    groups.push({ key, head: a, count: 1 });
  }
  body.innerHTML = groups.map(g => {
    const a = g.head;
    const cntBadge = g.count > 1 ? `<span class="agg-count" title="60s 内重复 ${g.count} 次">×${g.count}</span>` : "";
    return `
    <div class="alert-row level-row-${a.level}" data-pk="${a.pool_key || ""}">
      <span class="ts" title="${fmtAbsTime(a.ts)}">${fmtRelTime(a.ts)}</span>
      <span class="level-tag level-${a.level}">${a.level_zh || a.level}</span>
      <span class="pool mono">${a.pool_key || ""}${cntBadge}</span>
      <span class="msg">${fmtAlertMessage(a.message)}</span>
    </div>
  `; }).join("");
  body.querySelectorAll(".alert-row").forEach(row => {
    row.onclick = () => {
      const pk = row.dataset.pk;
      if (!pk) return;
      state.currentPoolKey = pk;
      state.currentTab = "alerts";
      syncTabUi();
      setHash(pk, "alerts");
      renderBreadcrumb();
      renderTree(document.getElementById("tree-search").value);
      renderTab();
    };
  });
}

async function refreshAlertStream() {
  const r = await api("/api/alerts/recent?limit=10");
  const body = document.getElementById("alert-stream-body");
  if (!r.ok) {
    body.innerHTML = `<div class="error">加载告警失败: ${r.error}</div>`;
    return;
  }
  state.alertStream = (r.alerts || []).slice(0, ALERT_STREAM_MAX);
  renderAlertStream();
}

function prependAlert(alert) {
  if (!state.alertStream) state.alertStream = [];
  state.alertStream.unshift(alert);
  state.alertStream = state.alertStream.slice(0, ALERT_STREAM_MAX);
  renderAlertStream();
}

function prependEventAsAlert(ev) {
  // Show Track B chain events in the same stream, formatted alert-like.
  const pk = `${ev.chain || ""}:${ev.contract_role || ""}`;
  const shortTx = ev.tx_hash ? `${ev.tx_hash.slice(0,10)}…` : "";
  const dir = (ev.old_value && ev.new_value)
    ? `${ev.old_value.slice(0,10)}… → ${ev.new_value.slice(0,10)}…`
    : (ev.new_value ? ev.new_value.slice(0,10) + "…" : "");
  prependAlert({
    ts: ev.ts,
    level: ev.level || "info",
    level_zh: ev.level_zh || "事件",
    pool_key: pk,
    message: `🔗 [链上事件] ${ev.event} · ${dir} · tx ${shortTx}`,
  });
}

/* =========================================================
   WebSocket live stream
   ========================================================= */
const ws = {
  socket: null,
  reconnectDelay: 1000,      // starts 1s, backs off to 30s
  reconnectTimer: null,
  pingTimer: null,
  fallbackPolling: false,
};

function wsUrl() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  return `${proto}://${location.host}/api/ws/stream`;
}

function connectWs() {
  if (ws.socket && ws.socket.readyState === WebSocket.OPEN) return;
  try {
    ws.socket = new WebSocket(wsUrl());
  } catch (e) {
    console.warn("[ws] construct failed", e);
    scheduleReconnect();
    return;
  }
  ws.socket.onopen = () => {
    console.log("[ws] connected");
    ws.reconnectDelay = 1000;
    stopFallbackPolling();
    // ping every 25s to keep intermediaries from idling us out
    if (ws.pingTimer) clearInterval(ws.pingTimer);
    ws.pingTimer = setInterval(() => {
      if (ws.socket && ws.socket.readyState === WebSocket.OPEN) {
        ws.socket.send("ping");
      }
    }, 25000);
  };
  ws.socket.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (!msg || !msg.type) return;
    switch (msg.type) {
      case "status":
        applyStatus(msg.data);
        break;
      case "recent_alerts":
        state.alertStream = (msg.data || []).slice(0, ALERT_STREAM_MAX);
        renderAlertStream();
        break;
      case "alert":
        prependAlert(msg.data);
        break;
      case "event":
        prependEventAsAlert(msg.data);
        break;
      case "pong":
        break;
      default:
        console.debug("[ws] unknown msg", msg);
    }
  };
  ws.socket.onclose = () => {
    console.log("[ws] closed, reconnecting soon");
    if (ws.pingTimer) { clearInterval(ws.pingTimer); ws.pingTimer = null; }
    scheduleReconnect();
    startFallbackPolling();
  };
  ws.socket.onerror = (e) => {
    console.warn("[ws] error", e);
    // onclose will also fire; reconnect handled there
  };
}

function scheduleReconnect() {
  if (ws.reconnectTimer) return;
  const delay = ws.reconnectDelay;
  ws.reconnectTimer = setTimeout(() => {
    ws.reconnectTimer = null;
    ws.reconnectDelay = Math.min(30000, ws.reconnectDelay * 2);
    connectWs();
  }, delay);
}

let _fallbackStatusTimer = null;
let _fallbackAlertsTimer = null;
function startFallbackPolling() {
  if (ws.fallbackPolling) return;
  ws.fallbackPolling = true;
  _fallbackStatusTimer = setInterval(refreshStatus, 5000);
  _fallbackAlertsTimer = setInterval(refreshAlertStream, 30000);
}
function stopFallbackPolling() {
  if (!ws.fallbackPolling) return;
  ws.fallbackPolling = false;
  if (_fallbackStatusTimer) { clearInterval(_fallbackStatusTimer); _fallbackStatusTimer = null; }
  if (_fallbackAlertsTimer) { clearInterval(_fallbackAlertsTimer); _fallbackAlertsTimer = null; }
}

/* =========================================================
   Boot
   ========================================================= */
async function boot() {
  const r = parseHash();
  if (r) {
    state.currentPoolKey = r.poolKey;
    state.currentTab = r.tab;
    syncTabUi();
  } else {
    // 无 hash —— 默认进总览,而不是空白"请选择池子"
    state.currentTab = "__dashboard__";
    state.currentPoolKey = null;
  }
  // initial REST fetch so the UI paints immediately even if WS takes a beat
  await Promise.all([refreshStatus(), loadPools(), refreshAlertStream(), renderHiddenPoolsPanel()]);
  // 先拉告警汇总,这样 renderTree 就能直接把徽章画上
  await refreshAlertSummary();
  renderBreadcrumb();
  renderTree();
  syncTabUi();
  renderTab();
  // 绑定 "总览" 入口点击
  const oe = document.getElementById("tree-overview-entry");
  if (oe) oe.onclick = () => goDashboard();
  // 侧栏告警徽章每 45s 刷新
  setInterval(() => { refreshAlertSummary().catch(() => {}); }, 45000);
  // dashboard 面板若用户在看,每 60s 重绘
  _startDashboardTimer();
  // 顶栏 🔍 按钮 + 全局 Cmd/Ctrl+K
  const cmdkBtn = document.getElementById("cmdk-btn");
  if (cmdkBtn) cmdkBtn.onclick = () => openCmdK();
  window.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")) {
      e.preventDefault();
      if (state.cmdkOpen) closeCmdK(); else openCmdK();
    } else if (e.key === "Escape" && state.cmdkOpen) {
      closeCmdK();
    }
  });
  // switch status + alert stream from polling to WebSocket server-push
  connectWs();
}

document.addEventListener("DOMContentLoaded", boot);
</script>
